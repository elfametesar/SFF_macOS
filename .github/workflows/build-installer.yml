name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      push_as_release:
        description: 'Push result as a GitHub Release?'
        required: true
        default: false
        type: boolean

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - shell: cmd
        run: |
          choco install nsis -y
          if not exist "C:\Program Files (x86)\NSIS" mkdir "C:\Program Files (x86)\NSIS"
          copy "C:\ProgramData\chocolatey\bin\makensis.exe" "C:\Program Files (x86)\NSIS\makensis.exe" /Y

      - run: git apply macos_adjustments.patch

      - shell: cmd
        run: call build_installer.bat

      - if: ${{ inputs.push_as_release == true }}
        uses: softprops/action-gh-release@v2
        with:
          files: SteaMidra-*-Setup.exe
          token: ${{ secrets.GITHUB_TOKEN }}
