name: Build macOS Wine Installer
on:
  workflow_dispatch:
    inputs:
      push_as_release:
        description: 'Push result as a GitHub Release?'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install steam==1.4.4 --no-deps
          pip install pyinstaller
      - name: Setup NSIS Environment
        shell: cmd
        run: |
          choco install nsis -y
          echo C:\Program Files (x86)\NSIS>> %GITHUB_PATH%
      - name: Build LumaCore
        shell: cmd
        working-directory: LumaCore
        run: call build.bat --no-pause
      - run: git apply macos_adjustments.patch
      - shell: cmd
        run: call build_installer.bat
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SteaMidra-build
          path: |
            SteaMidra-*-Setup.exe
            LumaCore/Releases/Release/dwmapi.dll
            LumaCore/Releases/Release/LumaCore.dll
            LumaCore/Releases/Debug/dwmapi.dll
            LumaCore/Releases/Debug/LumaCore.dll
          if-no-files-found: warn
      - if: ${{ inputs.push_as_release == true }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          files: |
            SteaMidra-*-Setup.exe
            LumaCore/Releases/Release/dwmapi.dll
            LumaCore/Releases/Release/LumaCore.dll
            LumaCore/Releases/Debug/dwmapi.dll
            LumaCore/Releases/Debug/LumaCore.dll
          token: ${{ secrets.GITHUB_TOKEN }}
