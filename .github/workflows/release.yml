name: Build & Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3.12 python3.12-venv python3.12-dev wget \
            libfuse2 libatomic1 libnss3 libnspr4 libxkbfile1 \
            libxkbcommon-x11-0 libxcb-cursor0 libxcb-xkb1 libxcb-image0 \
            libxcb-keysyms1 libxcb-util1 libxcb-render-util0 libxcb-icccm4 \
            libxcb-shape0 libasound2t64
      - name: Generate Google Drive credential shim
        env:
          STEAMIDRA_GDRIVE_CLIENT_ID: ${{ secrets.STEAMIDRA_GDRIVE_CLIENT_ID }}
          STEAMIDRA_GDRIVE_CLIENT_SECRET: ${{ secrets.STEAMIDRA_GDRIVE_CLIENT_SECRET }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path
          cid = os.environ.get("STEAMIDRA_GDRIVE_CLIENT_ID", "")
          secret = os.environ.get("STEAMIDRA_GDRIVE_CLIENT_SECRET", "")
          if not cid or not secret:
              raise SystemExit("Google Drive secrets are missing")
          Path("sff/_gc.py").write_text(
              "# SteaMidra - generated in CI; do not commit\n"
              "def get_ci():\n"
              f"    return {cid!r}\n\n"
              "def get_cs():\n"
              f"    return {secret!r}\n",
              encoding="utf-8",
          )
          PY
      - name: Verify Google Drive support
        run: |
          python3 -m pip install google-auth google-auth-oauthlib google-api-python-client
          python3 - <<'PY'
          import sff._gc
          from sff.google_drive import is_available
          if not is_available():
              raise SystemExit("Google Drive support is not available")
          print("Google Drive imports OK")
          PY
      - name: Build Linux AppImage
        run: bash build_linux_appimage.sh --fresh
      - name: Create Linux zip
        run: |
          VERSION=$(grep '^VERSION =' sff/strings.py | cut -d'"' -f2)
          echo "Building Linux zip for version: $VERSION"
          zip -j "SteaMidra-${VERSION}-linux.zip" \
            SteaMidra-${VERSION}-x86_64.AppImage \
            steamidra_install.sh \
            SFF.png
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: SteaMidra-*-linux.zip
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install NSIS
        uses: negrutiu/nsis-install@v2
      - name: Generate Google Drive credential shim
        shell: pwsh
        env:
          STEAMIDRA_GDRIVE_CLIENT_ID: ${{ secrets.STEAMIDRA_GDRIVE_CLIENT_ID }}
          STEAMIDRA_GDRIVE_CLIENT_SECRET: ${{ secrets.STEAMIDRA_GDRIVE_CLIENT_SECRET }}
        run: |
          if (-not $env:STEAMIDRA_GDRIVE_CLIENT_ID -or -not $env:STEAMIDRA_GDRIVE_CLIENT_SECRET) {
            throw "Google Drive secrets are missing"
          }
          python -c "from pathlib import Path; import os; cid=os.environ['STEAMIDRA_GDRIVE_CLIENT_ID']; secret=os.environ['STEAMIDRA_GDRIVE_CLIENT_SECRET']; Path('sff/_gc.py').write_text('# SteaMidra - generated in CI; do not commit\n' + 'def get_ci():\n' + f'    return {cid!r}\n\n' + 'def get_cs():\n' + f'    return {secret!r}\n', encoding='utf-8')"
      - name: Run full build_installer.bat
        shell: cmd
        run: |
          python -m venv .venv
          call .venv\Scripts\activate.bat
          python -m pip install --upgrade pip || exit /b 1
          python -m pip install -r requirements.txt || exit /b 1
          python -m pip install steam==1.4.4 --no-deps || exit /b 1
          python -m pip install pyinstaller || exit /b 1
          python -c "import PyQt6.QtCore, PyQt6.QtWebEngineCore, prompt_toolkit, selenium, keyring, nacl, cryptography, googleapiclient, zendriver, bs4; import sff._gc; from sff.google_drive import is_available; assert is_available(); print('all imports OK')" || exit /b 1
          call build_installer.bat
          if not exist "dist\SteaMidra_GUI\_internal\PyQt6\Qt6\bin\Qt6Core.dll" (
            echo ERROR: Qt6Core.dll missing from _internal — PyInstaller produced a hollow build.
            exit /b 1
          )
          powershell -NoProfile -Command "$bad = Get-ChildItem -LiteralPath 'dist\SteaMidra_GUI' -Recurse -File | Where-Object { $_.Name -like '*.so*' -or $_.FullName -match 'linux|x86_64-linux-gnu' }; if ($bad) { $bad | Select-Object -First 40 FullName; throw 'Linux files leaked into Windows package' }"
      - name: Create portable Windows zip
        shell: pwsh
        run: |
          $version = (Select-String -Path "sff\strings.py" -Pattern '^VERSION = "(.+)"').Matches.Groups[1].Value
          echo "Building Windows portable zip for version: $version"
          Compress-Archive -Force -Path "dist\SteaMidra_GUI" -DestinationPath "SteaMidra-${version}-windows.zip"
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            SteaMidra-*-windows.zip
            SteaMidra-*-Setup.exe
  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code (needed for release-note.md)
        uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            linux-release/SteaMidra-*-linux.zip
            windows-release/SteaMidra-*-windows.zip
            windows-release/SteaMidra-*-Setup.exe
          draft: false
          prerelease: false
          body_path: release-note.md
